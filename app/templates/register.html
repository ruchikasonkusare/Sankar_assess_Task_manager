<!-- register.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>

<body style="margin:0; padding:0; font-family:Arial, sans-serif; background:#f4f7fc; height:100vh; display:flex; justify-content:center; align-items:center;">

    <div style="background:white; width:400px; padding:40px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">

        <h2 style="text-align:center; margin-bottom:25px; color:#333;">
            Register
        </h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}

                    <div style="
                        padding:10px;
                        margin-bottom:15px;
                        border-radius:5px;
                        text-align:center;
                        background:{% if category == 'success' %}#d4edda{% else %}#f8d7da{% endif %};
                        color:{% if category == 'success' %}#155724{% else %}#721c24{% endif %};
                    ">
                        {{ message }}
                    </div>

                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div style="margin-bottom:20px;">

                <label style="display:block; margin-bottom:8px; color:#555;">
                    Username
                </label>

                <input 
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required

                    style="
                        width:100%;
                        padding:12px;
                        border:1px solid #ccc;
                        border-radius:6px;
                        outline:none;
                    "
                >
            </div>

            <div style="margin-bottom:20px;">

                <label style="display:block; margin-bottom:8px; color:#555;">
                    Email
                </label>

                <input 
                    type="email"
                    name="email"
                    placeholder="Enter Email"
                    required

                    style="
                        width:100%;
                        padding:12px;
                        border:1px solid #ccc;
                        border-radius:6px;
                        outline:none;
                    "
                >
            </div>

            <div style="margin-bottom:20px;">

                <label style="display:block; margin-bottom:8px; color:#555;">
                    Password
                </label>

                <input 
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required

                    style="
                        width:100%;
                        padding:12px;
                        border:1px solid #ccc;
                        border-radius:6px;
                        outline:none;
                    "
                >
            </div>

            <button 
                type="submit"

                style="
                    width:100%;
                    padding:12px;
                    background:#4a90e2;
                    color:white;
                    border:none;
                    border-radius:6px;
                    cursor:pointer;
                    font-size:16px;
                "
            >
                Register
            </button>

        </form>

        <p style="text-align:center; margin-top:15px;">

            Already have an account?

            <a 
                href="{{ url_for('auth.login') }}"
                style="text-decoration:none; color:#4a90e2;"
            >
                Login
            </a>

        </p>

    </div>

</body>
</html>
